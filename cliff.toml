# git-cliff configuration — generates CHANGELOG.md from conventional commits.
# Run locally:  git-cliff --tag v0.X.Y -o CHANGELOG.md
# Run in CI:    .github/workflows/release.yml fires on `git push --tags`.
#
# See https://git-cliff.org/docs/configuration for the full reference.

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project are documented here.
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and
[Conventional Commits](https://www.conventionalcommits.org/).

"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**({{ commit.scope }})** {% endif %}\
            {{ commit.message | upper_first | trim }} \
            ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/orkestra-cc/orkestra/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = "<!-- generated by git-cliff -->\n"

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# regex for parsing and grouping commits.
# Order matters: the first matching rule wins, so breaking-change rules
# go at the top to catch `feat(scope)!:` / `fix(scope)!:` before the
# generic ^feat / ^fix rules pull them into the regular sections. A
# second rule catches commits with a `BREAKING CHANGE:` footer but no
# `!` marker (uncommon but valid per the conventional-commits spec).
commit_parsers = [
  { message = ".*!:", group = "<!-- -1 -->⚠️ Breaking Changes" },
  { body = "BREAKING[ -]CHANGE:", group = "<!-- -1 -->⚠️ Breaking Changes" },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Tests" },
  { message = "^build", group = "<!-- 6 -->Build" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(badges\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "<!-- 8 -->Dependencies" },
  { message = "^chore", group = "<!-- 9 -->Chores" },
  { message = "^style", group = "<!-- 10 -->Style" },
  { message = "^revert", group = "<!-- 11 -->Reverts" },
  { message = "^Merge", skip = true },
]
# filter out the commits that are not matched by commit parsers
filter_commits = false
# regex for matching git tags to be included in the changelog
tag_pattern = "v[0-9].*"
# regex for skipping tags (none for now)
skip_tags = ""
# sort the commits inside sections by oldest/newest order
sort_commits = "newest"

[remote.github]
owner = "orkestra-cc"
repo = "orkestra"
