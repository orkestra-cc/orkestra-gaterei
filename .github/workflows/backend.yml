name: Backend CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend
          args: --config=.golangci.yml

  tenantscope:
    name: Tenant-scoping analyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Download dependencies
        run: go mod download

      - name: Run tenantscope unit tests
        run: go test ./tools/tenantscope/...

      - name: Enforce tenant-scoping invariant across internal/ (addons, core, shared)
        run: go run ./tools/tenantscope/cmd/tenantscope -baseline=tools/tenantscope/baseline.txt ./internal/...

  policycoverage:
    name: Policy coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Download dependencies
        run: go mod download

      - name: Run policycoverage unit tests
        run: go test ./tools/policycoverage/...

      - name: Reconcile permission + capability catalog against route middleware
        run: |
          go run ./tools/policycoverage/cmd/policycoverage \
            -baseline=tools/policycoverage/baseline.txt \
            -cedar=internal/core/authz/cedar/policies \
            -markdown=policy-coverage-report.md \
            -json=policy-coverage-report.json \
            ./internal/...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: policy-coverage-report
          path: |
            backend/policy-coverage-report.md
            backend/policy-coverage-report.json

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: 15
    services:
      mongodb:
        image: mongo:8.0
        ports: ['27017:27017']
      redis:
        image: redis/redis-stack-server:latest
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...
        env:
          MONGO_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Allowlist: vulnerabilities reachable in our code that upstream has
        # marked "Fixed in: N/A" — there is no remediation available. Each
        # entry MUST be re-evaluated whenever the relevant dependency is
        # bumped. See backend/CLAUDE.md for the policy.
        #
        # GO-2026-4887 — Moby AuthZ plugin bypass on oversized request
        #                bodies. Affects Docker daemon-side authz plugin
        #                enforcement, not SDK consumers like us.
        # GO-2026-4883 — Moby off-by-one in plugin privilege validation.
        #                Same daemon-side scope.
        run: |
          set +e
          govulncheck -format=json ./... > /tmp/govuln.json
          set -e

          # Human-readable output for the job log.
          govulncheck ./... || true

          # IDs of vulnerabilities with at least one reachable call site.
          reachable_ids=$(jq -r 'select(.finding != null and (.finding.trace | length) > 0) | .finding.osv' /tmp/govuln.json | sort -u)
          echo "Reachable vulnerability IDs:"
          echo "${reachable_ids:-<none>}"

          allowlist="GO-2026-4887 GO-2026-4883"

          unaccepted=""
          for id in $reachable_ids; do
            case " $allowlist " in
              *" $id "*) ;;
              *) unaccepted="$unaccepted $id" ;;
            esac
          done

          if [ -n "$unaccepted" ]; then
            echo "::error::Unaccepted vulnerabilities reachable from our code:$unaccepted"
            exit 1
          fi
          echo "All reachable vulnerabilities are on the allowlist."

  build:
    name: Build (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # The default (enterprise) profile is the load-bearing build;
          # the other profiles run as dependency-closure smoke tests so a
          # missing tag in catalog_<addon>.go shows up here, not at deploy.
          - profile: enterprise
            tags: ""
          - profile: starter
            tags: "no_addons"
          - profile: minimal
            tags: "no_addons addon_dev"
          - profile: billing
            tags: "no_addons addon_billing addon_documents addon_company addon_dev"
          - profile: ai
            tags: "no_addons addon_graph addon_aimodels addon_rag addon_agents addon_sales addon_dev"
          - profile: saas
            tags: "no_addons addon_subscriptions addon_payments addon_compliance addon_identity addon_dev"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Build binary
        run: go build -tags "${{ matrix.tags }}" -o bin/server-${{ matrix.profile }} ./cmd/server

  docker:
    name: Docker Build (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # `enterprise` carries the `:latest` alias so existing pulls of
          # `ghcr.io/.../backend:latest` keep getting the full-suite image.
          # Other profiles publish only `:<profile>` and `:<profile>-<sha>`.
          - profile: enterprise
            tags: ""
            include_latest: true
          - profile: starter
            tags: "no_addons"
            include_latest: false
          - profile: minimal
            tags: "no_addons addon_dev"
            include_latest: false
          - profile: billing
            tags: "no_addons addon_billing addon_documents addon_company addon_dev"
            include_latest: false
          - profile: ai
            tags: "no_addons addon_graph addon_aimodels addon_rag addon_agents addon_sales addon_dev"
            include_latest: false
          - profile: saas
            tags: "no_addons addon_subscriptions addon_payments addon_compliance addon_identity addon_dev"
            include_latest: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          build-args: |
            BUILD_TAGS=${{ matrix.tags }}
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ matrix.profile }}-${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:${{ matrix.profile }}
            ${{ matrix.include_latest && format('ghcr.io/{0}/backend:latest', github.repository) || '' }}
          # Per-profile GHA cache scope. Different BUILD_TAGS produce different
          # `go build` cache keys, so a shared scope would thrash; each profile
          # keeps its own history and re-runs on the same SHA stay warm. The
          # base layer (`go mod download`) is content-addressed by go.sum, so
          # the duplication across scopes is cheap and dedupes at the registry.
          cache-from: type=gha,scope=docker-${{ matrix.profile }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.profile }}
