name: Backend CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'
  push:
    branches: [dev, main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    env:
      MONGO_URI: mongodb://localhost:27017
      REDIS_URL: redis://localhost:6379
      COVERAGE_THRESHOLD: 15
    services:
      mongodb:
        image: mongo:8.0
        ports: ['27017:27017']
      redis:
        image: redis/redis-stack-server:latest
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install backend toolchain only
        run: mise install go golangci-lint jq "go:golang.org/x/vuln/cmd/govulncheck"
      - name: Run backend CI (mirrors `make ci-backend` locally)
        run: make ci-backend
      - name: Enforce coverage threshold
        working-directory: backend
        run: |
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $NF}')
          echo "Coverage: ${PCT}%"
          awk -v p="$PCT" -v t="$COVERAGE_THRESHOLD" 'BEGIN { exit !(p+0 >= t+0) }' \
            || { echo "::error::Coverage ${PCT}% is below ${COVERAGE_THRESHOLD}% threshold"; exit 1; }
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.out
      - name: Upload policy coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: policy-coverage-report
          path: |
            backend/policy-coverage-report.md
            backend/policy-coverage-report.json
        continue-on-error: true

  coverage-badge:
    name: Refresh coverage badge
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install backend toolchain only
        run: mise install go golangci-lint jq "go:golang.org/x/vuln/cmd/govulncheck"
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend/
      - name: Refresh badge SVG
        run: scripts/refresh-coverage-badge.sh backend
      - name: Commit refreshed badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(badges): refresh backend coverage [skip ci]"
          file_pattern: .github/badges/backend-coverage.svg

  docker:
    name: Docker Build
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha,scope=docker-backend
          cache-to: type=gha,mode=max,scope=docker-backend
