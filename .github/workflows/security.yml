name: Security Scan

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-vulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # Allowlist mirrors backend.yml's Vulnerability Check job: keep both
        # gates in sync so a known-accepted upstream advisory doesn't fail one
        # workflow while the other lets it through. See backend/CLAUDE.md for
        # the policy on adding entries.
        #
        # GO-2026-4887 — Moby AuthZ plugin bypass on oversized request bodies.
        # GO-2026-4883 — Moby off-by-one in plugin privilege validation.
        # Both are daemon-side issues; we consume the SDK only.
        run: |
          set +e
          govulncheck -format=json ./... > /tmp/govuln.json
          set -e

          govulncheck ./... || true

          reachable_ids=$(jq -r 'select(.finding != null and (.finding.trace | length) > 0) | .finding.osv' /tmp/govuln.json | sort -u)
          echo "Reachable vulnerability IDs:"
          echo "${reachable_ids:-<none>}"

          allowlist="GO-2026-4887 GO-2026-4883"

          unaccepted=""
          for id in $reachable_ids; do
            case " $allowlist " in
              *" $id "*) ;;
              *) unaccepted="$unaccepted $id" ;;
            esac
          done

          if [ -n "$unaccepted" ]; then
            echo "::error::Unaccepted vulnerabilities reachable from our code:$unaccepted"
            exit 1
          fi
          echo "All reachable vulnerabilities are on the allowlist."

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high
