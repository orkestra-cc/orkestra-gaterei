name: Mobile CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'
  push:
    branches: [dev, main]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install mobile toolchain only
        run: mise install flutter
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      - name: Run mobile CI (mirrors `make ci-mobile` locally)
        run: make ci-mobile
      - name: Run tests with coverage
        working-directory: mobile
        run: flutter test --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mobile-coverage
          path: mobile/coverage/

  coverage-badge:
    name: Refresh coverage badge
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: mobile-coverage
          path: mobile/coverage/
      - name: Refresh badge SVG
        run: scripts/refresh-coverage-badge.sh mobile
      - name: Commit refreshed badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(badges): refresh mobile coverage [skip ci]"
          file_pattern: .github/badges/mobile-coverage.svg

  build-android:
    name: Build Android
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install mobile toolchain only
        run: mise install flutter
      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get
      - name: Build APK
        working-directory: mobile
        run: flutter build apk -t lib/main_production.dart --release
      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: orkestra-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
