name: Frontend Admin CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'
  push:
    branches: [dev, main]
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - name: Install dependencies
        working-directory: frontend-admin
        run: npm ci
      - name: Run frontend-admin CI (mirrors `make ci-frontend-admin` locally)
        run: make ci-frontend-admin
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-admin-coverage
          path: frontend-admin/coverage/

  coverage-badge:
    name: Refresh coverage badge
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-admin-coverage
          path: frontend-admin/coverage/
      - name: Refresh badge SVG
        run: scripts/refresh-coverage-badge.sh frontend-admin
      - name: Commit refreshed badge
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(badges): refresh frontend-admin coverage [skip ci]"
          file_pattern: .github/badges/frontend-admin-coverage.svg

  docker:
    name: Docker Build
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # NOTE: GHCR image name stays at `frontend:*` for now to avoid stale
      # tag references in deployment manifests. PR 2 will dual-publish to
      # `frontend-admin:*` for a deprecation window, then drop the legacy
      # name. Do not rename here without coordinating that transition.
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend-admin
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=https://api.orkestra.cc
            VITE_BACKEND_URL=https://api.orkestra.cc
            VITE_ENV=production
