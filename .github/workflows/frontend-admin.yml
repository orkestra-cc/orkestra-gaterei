name: Frontend Admin CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'
  push:
    branches: [dev, main]
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: frontend-admin

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx,.ts,.tsx --max-warnings 0

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by the auto-commit step that refreshes the coverage badge
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Refresh coverage badge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        run: |
          PCT=$(jq -r '.total.lines.pct' coverage/coverage-summary.json)
          INT=$(printf '%.0f' "$PCT")
          if   [ "$INT" -ge 80 ]; then COLOR=brightgreen
          elif [ "$INT" -ge 70 ]; then COLOR=green
          elif [ "$INT" -ge 60 ]; then COLOR=yellowgreen
          elif [ "$INT" -ge 50 ]; then COLOR=yellow
          elif [ "$INT" -ge 40 ]; then COLOR=orange
          else                          COLOR=red
          fi
          mkdir -p ../.github/badges
          curl -fsSL "https://img.shields.io/badge/coverage-${PCT}%25-${COLOR}?style=flat-square&logo=react&logoColor=white&label=frontend-admin" \
            -o ../.github/badges/frontend-admin-coverage.svg

      - name: Commit refreshed badge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(badges): refresh frontend-admin coverage [skip ci]"
          file_pattern: .github/badges/frontend-admin-coverage.svg

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production
        run: npm run build
        env:
          VITE_API_URL: https://api.orkestra.cc
          VITE_BACKEND_URL: https://api.orkestra.cc
          VITE_ENV: production

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: GHCR image name stays at `frontend:*` for now to avoid stale
      # tag references in deployment manifests. PR 2 will dual-publish to
      # `frontend-admin:*` for a deprecation window, then drop the legacy
      # name. Do not rename here without coordinating that transition.
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend-admin
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_API_URL=https://api.orkestra.cc
            VITE_BACKEND_URL=https://api.orkestra.cc
            VITE_ENV=production
