name: Frontend Admin CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'
  push:
    branches: [dev, main]
    # Release tags (vX.Y.Z) build versioned images. paths filters do not
    # apply to tag pushes, so a tag always triggers a full build + publish.
    tags:
      - 'v*'
    paths:
      - 'frontend-admin/**'
      - '.github/workflows/frontend-admin.yml'
      - 'Makefile'
      - '.mise.toml'
      - 'scripts/refresh-coverage-badge.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install frontend toolchain only
        run: mise install node
      - name: Install dependencies
        working-directory: frontend-admin
        run: npm ci
      - name: Run frontend-admin CI (mirrors `make ci-frontend-admin` locally)
        run: make ci-frontend-admin
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-admin-coverage
          path: frontend-admin/coverage/

  coverage-badge:
    name: Refresh coverage badge
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install frontend toolchain only
        run: mise install node
      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-admin-coverage
          path: frontend-admin/coverage/
      - name: Refresh badge SVG
        run: scripts/refresh-coverage-badge.sh frontend-admin
      - name: Commit refreshed badge
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(badges): refresh frontend-admin coverage [skip ci]"
          file_pattern: .github/badges/frontend-admin-coverage.svg

  docker:
    name: Docker Build
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # NOTE: GHCR image name stays at `frontend:*` for now to avoid stale
      # tag references in deployment manifests. PR 2 will dual-publish to
      # `frontend-admin:*` for a deprecation window, then drop the legacy
      # name. Do not rename here without coordinating that transition.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name stays `frontend` (see NOTE above) — not `frontend-admin`.
          images: ghcr.io/${{ github.repository }}/frontend
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend-admin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # window.__ORKESTRA_CONFIG__ (apiUrl/wsUrl/env/debug) is populated
          # at *container start* from ORKESTRA_API_URL / ORKESTRA_WS_URL /
          # ORKESTRA_ENV / ORKESTRA_DEBUG by the nginx entrypoint — see
          # frontend-admin/Dockerfile + frontend-admin/public/config.js. The
          # only thing baked here is the application version, read by
          # Vite's `define` and surfaced in the SPA footer + /health.
          build-args: |
            ORKESTRA_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
