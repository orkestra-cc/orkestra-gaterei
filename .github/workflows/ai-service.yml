name: AI Service CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'backend/cmd/ai-service/**'
      - 'backend/internal/addons/graph/**'
      - 'backend/internal/addons/aimodels/**'
      - 'backend/internal/addons/rag/**'
      - 'backend/internal/addons/agents/**'
      - 'backend/internal/shared/**'
      - 'backend/Dockerfile.ai-service'
      - '.github/workflows/ai-service.yml'
  push:
    branches: [dev, main]
    paths:
      - 'backend/cmd/ai-service/**'
      - 'backend/internal/addons/graph/**'
      - 'backend/internal/addons/aimodels/**'
      - 'backend/internal/addons/rag/**'
      - 'backend/internal/addons/agents/**'
      - 'backend/internal/shared/**'
      - 'backend/Dockerfile.ai-service'
      - '.github/workflows/ai-service.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          working-directory: backend
          args: --config=.golangci.yml

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8.0
        ports: ['27017:27017']
      redis:
        image: redis/redis-stack-server:latest
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...
        env:
          MONGO_URI: mongodb://localhost:27017
          REDIS_URL: redis://localhost:6379

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build AI service binary
        run: go build -o bin/ai-service ./cmd/ai-service/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.ai-service
          target: production
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/ai-service:${{ github.sha }}
            ghcr.io/${{ github.repository }}/ai-service:latest
