name: Frontend Client CI

# Tier-2 customer-facing SPA. Tests not yet wired (vitest not configured);
# `make ci-frontend-client` runs typecheck + lint + build. Add a test job
# here when tests land.

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'frontend-client/**'
      - '.github/workflows/frontend-client.yml'
      - 'Makefile'
      - '.mise.toml'
  push:
    branches: [dev, main]
    # Release tags (vX.Y.Z) build versioned images. paths filters do not
    # apply to tag pushes, so a tag always triggers a full build + publish.
    tags:
      - 'v*'
    paths:
      - 'frontend-client/**'
      - '.github/workflows/frontend-client.yml'
      - 'Makefile'
      - '.mise.toml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
      - name: Install frontend toolchain only
        run: mise install node
      - name: Install dependencies
        working-directory: frontend-client
        run: npm ci
      - name: Run frontend-client CI (mirrors `make ci-frontend-client` locally)
        run: make ci-frontend-client

  docker:
    name: Docker Build
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend-client
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=long
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v7
        with:
          context: ./frontend-client
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Baked into the JS bundle by Vite's `define` — the only thing
          # this image needs at build time. Tag pushes bake the semver
          # (`v0.1.4`); branch pushes bake the commit sha.
          build-args: |
            ORKESTRA_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
