name: Release

# Triggered when an annotated tag matching `vX.Y.Z` is pushed.
# Manual flow:
#   1. Bump version in CHANGELOG locally if you want to preview:
#        git-cliff --tag v0.2.0 -o CHANGELOG.md && git commit -am "chore(release): v0.2.0 changelog"
#   2. Tag and push:
#        git tag -a v0.2.0 -m "v0.2.0"
#        git push --tags
#   3. This workflow generates the per-tag changelog body, opens a
#      GitHub Release with it, and (re-)commits the full CHANGELOG.md.
#
# No version-bump automation today (no release-please) — tagging is
# deliberate. See GOVERNANCE.md "Releases" for the cadence policy.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)release (e.g. v0.2.0)'
        required: true
        type: string

permissions:
  contents: write   # required to commit CHANGELOG + create Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # git-cliff needs full history

      - uses: jdx/mise-action@v4
        with:
          install: true

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync frontend package.json versions with the tag
        # Footer + /health derive their version from the git tag at build
        # time (`vite.config.{js,ts}` reads GITHUB_REF_NAME / git describe).
        # package.json is cosmetic — kept in lockstep here so external
        # tooling (`npm version`, dependency dashboards, GitHub's package
        # cards) sees the same number as the released artefact.
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SEMVER="${TAG#v}"
          for dir in frontend-admin frontend-client; do
            (
              cd "$dir"
              npm version --no-git-tag-version --allow-same-version "$SEMVER"
            )
          done

      - name: Generate full CHANGELOG.md (all history through this tag)
        run: git-cliff --tag "${{ steps.tag.outputs.tag }}" -o CHANGELOG.md

      - name: Generate release body (commits since last tag → this tag)
        id: body
        run: |
          # --latest emits only the most recent release section, which is
          # exactly what the Release body should show.
          BODY=$(git-cliff --tag "${{ steps.tag.outputs.tag }}" --latest --strip header)
          # Multi-line output to $GITHUB_OUTPUT requires the delimiter
          # heredoc syntax.
          {
            echo 'body<<RELEASE_BODY_EOF'
            echo "$BODY"
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Commit refreshed CHANGELOG.md + synced package.json (if changed)
        # Carries any regenerated artefacts (CHANGELOG body + the two
        # package.json version fields) onto main in a single commit.
        # No-op when everything is already current.
        run: |
          STAGED=()
          for f in CHANGELOG.md frontend-admin/package.json frontend-client/package.json; do
            if ! git diff --quiet -- "$f"; then
              # Flatten the path into the temp name. Using basename here would
              # collapse frontend-admin/package.json and frontend-client/
              # package.json to the same /tmp/package.json file — the second
              # clobbers the first, and BOTH get restored from it, overwriting
              # frontend-admin's manifest with the client's. (Bit v0.2.0 +
              # v0.2.1; see PR #75.) Keep the path-unique name.
              cp "$f" "/tmp/refreshed-${f//\//-}"
              STAGED+=("$f")
            fi
          done
          if [ ${#STAGED[@]} -eq 0 ]; then
            echo "Nothing to commit — CHANGELOG + package.json files already current."
            exit 0
          fi
          # We're currently on a detached HEAD at the tag commit; cp via
          # /tmp avoids the "git checkout - -- file" gymnastics.
          # Reset the working tree for the staged paths so `git checkout
          # main` below doesn't refuse with "Your local changes ... would
          # be overwritten by checkout". The regenerated bytes are safely
          # in /tmp; we'll cp them back after switching branches.
          git checkout -- "${STAGED[@]}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          for f in "${STAGED[@]}"; do
            cp "/tmp/refreshed-${f//\//-}" "$f"
            git add "$f"
          done
          # The files on main may already match what we regenerated
          # (e.g. CHANGELOG bumped locally before tagging). `git commit`
          # complains about "nothing to commit" in that case — guard.
          if git diff --cached --quiet; then
            echo "All refreshed artefacts already match main — no commit needed."
            exit 0
          fi
          git commit -m "chore(release): refresh CHANGELOG.md + package.json for ${{ steps.tag.outputs.tag }}"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body: ${{ steps.body.outputs.body }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
