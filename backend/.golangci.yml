version: "2"

run:
  timeout: 5m
  tests: false

linters:
  # Only run the linters explicitly listed below. v2 otherwise auto-enables
  # the "standard" preset (errcheck/govet/staticcheck/unused/ineffassign),
  # which would surface ~690 legacy issues the codebase has never been
  # tested against. Re-enable defaults via `default: standard` once that
  # backlog is cleaned up.
  default: none
  enable:
    - gocritic
    - gosec
    - prealloc
    - nolintlint
  # misspell is intentionally disabled — the SDI/FatturaPA billing module
  # and document templates carry Italian text (preventivo, contanti,
  # identificativo, progressivo, contributo, applicabile, configurato),
  # which misspell flags as English misspellings. Re-enable with an
  # explicit allow-list once that file set is bounded.

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        # hugeParam: Huma request/response structs are large by design.
        - hugeParam
        # The rest are stylistic suggestions that flag widely across the
        # tree without indicating real bugs. Cleaning them up is a
        # separate refactor — keep them off so gocritic surfaces only
        # diagnostics that have a higher signal-to-noise ratio.
        - importShadow
        - paramTypeCombine
        - unnamedResult
        - ifElseChain
        - httpNoBody
        - whyNoLint
        - emptyStringTest
        - regexpSimplify
        - builtinShadow
        - sprintfQuotedString
        - elseif
        - assignOp
        - exitAfterDefer

    gosec:
      excludes:
        # G104: unhandled errors in deferred calls — common Go pattern.
        - G104
        # G101: gosec flags string constants whose names contain "key"/
        # "token"/"secret" (e.g. ServiceJWTService = "jwt", TokenTypeAccess
        # = "access"). Every flagged constant in this tree is a registry
        # key or token-type label, not a hardcoded credential.
        - G101
        # G118: triggered by Start() goroutines and notification fan-outs
        # that intentionally outlive the originating request context. The
        # use of context.Background() in those cases is by design.
        - G118
        # G304: file paths read from server-side config (TLS keys, policy
        # bundles). No external user input feeds these readers.
        - G304
        # G115/G117: integer-overflow conversions that are bounded by the
        # surrounding logic (e.g. argon2 cost params, JWT claim sizes).
        - G115
        - G117
        # G124: gosec doesn't see Secure/HttpOnly/SameSite set on later
        # struct fields — every flagged http.Cookie literal does set them.
        - G124
        # G203: documents/template_engine renders Markdown via text/template
        # because the output is PDF, not HTML. Auto-escape would corrupt
        # the markup.
        - G203
        # G401/G501/G505: md5/sha1 are used for device-fingerprint hashing
        # and oauth-state idempotency keys, not for security primitives.
        - G401
        - G501
        - G505
        # G705: sales report download — Content-Disposition: attachment
        # plus text/markdown means the browser doesn't render the body.
        - G705

    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    paths:
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
