# ORKESTRA Staging Environment Docker Compose
# Production-like behavior with staging credentials and URLs

name: orkestra-staging

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: staging
      PORT: 3000  # Internal port is always 3000, BACKEND_PORT is for host mapping only

      # MongoDB (internal port is always 27017, MONGO_PORT is for host mapping only)
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongodb}:27017/${MONGO_DATABASE}?authSource=admin

      # Redis (internal port is always 6379, REDIS_PORT is for host mapping only)
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379/${REDIS_DB:-0}

      # JWT & Auth (RS256 asymmetric keys)
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      # OAuth Token Encryption
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}

      # Cookie Configuration (production-like)
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-strict}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}
      ALLOW_LOCALHOST_REDIRECTS: ${ALLOW_LOCALHOST_REDIRECTS:-false}

      # OAuth (staging credentials)
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_GOOGLE_ANDROID_CLIENT_ID: ${OAUTH_GOOGLE_ANDROID_CLIENT_ID}
      OAUTH_GOOGLE_IOS_CLIENT_ID: ${OAUTH_GOOGLE_IOS_CLIENT_ID}
      OAUTH_GOOGLE_REDIRECT_URL: ${OAUTH_GOOGLE_REDIRECT_URL}

      OAUTH_APPLE_TEAM_ID: ${OAUTH_APPLE_TEAM_ID}
      OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID}
      OAUTH_APPLE_KEY_ID: ${OAUTH_APPLE_KEY_ID}
      OAUTH_APPLE_PRIVATE_KEY_PATH: /app/keys/apple.p8
      OAUTH_APPLE_REDIRECT_URL: ${OAUTH_APPLE_REDIRECT_URL}

      OAUTH_DISCORD_CLIENT_ID: ${OAUTH_DISCORD_CLIENT_ID}
      OAUTH_DISCORD_CLIENT_SECRET: ${OAUTH_DISCORD_CLIENT_SECRET}
      OAUTH_DISCORD_REDIRECT_URL: ${OAUTH_DISCORD_REDIRECT_URL}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.orkestra.cc}
      BACKEND_URL: ${BACKEND_URL:-https://staging-api.orkestra.cc}

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.orkestra.cc}

      # Security (production-like)
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}

      # Staging specific
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRETTY_LOGS: "false"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-orkestra-backend-staging}

      # OpenAPI shared
      OPENAPI_SANDBOX_MODE: ${OPENAPI_SANDBOX_MODE:-true}

      # Billing - OpenAPI SDI (sandbox mode for staging)
      OPENAPI_BILLING_BASE_URL: ${OPENAPI_BILLING_BASE_URL:-https://test.sdi.openapi.it}
      OPENAPI_BILLING_BEARER_TOKEN: ${OPENAPI_BILLING_BEARER_TOKEN:-}
      OPENAPI_BILLING_FISCAL_ID: ${OPENAPI_BILLING_FISCAL_ID:-}
      OPENAPI_BILLING_RECIPIENT_CODE: ${OPENAPI_BILLING_RECIPIENT_CODE:-JKKZDGR}
      OPENAPI_BILLING_APPLY_SIGNATURE: ${OPENAPI_BILLING_APPLY_SIGNATURE:-true}
      OPENAPI_BILLING_APPLY_STORAGE: ${OPENAPI_BILLING_APPLY_STORAGE:-true}
      OPENAPI_BILLING_TIMEOUT: ${OPENAPI_BILLING_TIMEOUT:-30s}
      OPENAPI_BILLING_RETRY_ATTEMPTS: ${OPENAPI_BILLING_RETRY_ATTEMPTS:-3}
      OPENAPI_BILLING_POLLING_INTERVAL: ${OPENAPI_BILLING_POLLING_INTERVAL:-5m}
      OPENAPI_BILLING_WEBHOOK_URL: ${OPENAPI_BILLING_WEBHOOK_URL:-}
      OPENAPI_BILLING_WEBHOOK_SECRET: ${OPENAPI_BILLING_WEBHOOK_SECRET:-}

      # Company Lookup - OpenAPI Company API
      OPENAPI_COMPANY_BEARER_TOKEN: ${OPENAPI_COMPANY_BEARER_TOKEN:-}
      OPENAPI_COMPANY_BASE_URL: ${OPENAPI_COMPANY_BASE_URL:-}
      OPENAPI_COMPANY_CACHE_TTL: ${OPENAPI_COMPANY_CACHE_TTL:-24h}
      OPENAPI_COMPANY_TIMEOUT: ${OPENAPI_COMPANY_TIMEOUT:-15s}

      # Graph Database - Memgraph
      GRAPH_ENABLED: ${GRAPH_ENABLED:-false}
      GRAPH_URI: ${GRAPH_URI:-bolt://localhost:7687}
      GRAPH_USERNAME: ${GRAPH_USERNAME:-}
      GRAPH_PASSWORD: ${GRAPH_PASSWORD:-}
      GRAPH_DATABASE: ${GRAPH_DATABASE:-memgraph}
      GRAPH_MAX_CONN_POOL: ${GRAPH_MAX_CONN_POOL:-25}
      GRAPH_TIMEOUT: ${GRAPH_TIMEOUT:-30s}
      GRAPH_ENCRYPTED: ${GRAPH_ENCRYPTED:-false}

      # AI Models
      AIMODELS_ENABLED: ${AIMODELS_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}

      # Agents / Hindsight
      AGENTS_ENABLED: ${AGENTS_ENABLED:-false}
      HINDSIGHT_URL: ${HINDSIGHT_URL:-http://orkestra-hindsight:8888}
      HINDSIGHT_NAMESPACE: ${HINDSIGHT_NAMESPACE:-orkestra}

      # RAG - Retrieval-Augmented Generation
      RAG_ENABLED: ${RAG_ENABLED:-false}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_DEFAULT_TOP_K: ${RAG_DEFAULT_TOP_K:-10}
    volumes:
      - ./keys:/app/keys:ro
      - orkestra-backend-logs-staging:/app/logs
      - orkestra-backend-uploads-staging:/app/uploads
    networks:
      - orkestra-network
    # Note: mongodb and redis are in docker-compose.infra.yml
    # Ensure infra is running: docker compose -f docker-compose.infra.yml up -d
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/3000 && echo 'OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: dhi.io/node:24-dev
    container_name: frontend
    user: "1000:1000"
    userns_mode: "host"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    environment:
      NODE_ENV: development
      VITE_ENV: staging
      VITE_DEBUG: "false"
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-/}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
      VITE_HMR_HOST: staging.orkestra.cc
      NODE_OPTIONS: "--max-old-space-size=4096"
      npm_config_cache: /app/.npm-cache
    volumes:
      - ../frontend:/app
      - ../frontend/.vite-cache:/app/.vite
      - ../frontend/.npm-cache:/app/.npm-cache
    networks:
      - orkestra-network
    depends_on:
      - backend
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]

volumes:
  orkestra-backend-logs-staging:
    driver: local
  orkestra-backend-uploads-staging:
    driver: local

networks:
  orkestra-network:
    external: true
