# ORKESTRA Staging Environment Docker Compose
# Production-like behavior with staging credentials and URLs

name: orkestra-staging

services:
  backend:
    # Hot reload (AIR) on staging — bind-mounted source, no image build.
    # Behavior remains staging-like (cookie strict, JWT, URLs, rate limits)
    # but the binary is rebuilt on every save. Switch back to production
    # build by restoring the `build:` block + removing `command:` + bind mount.
    image: dhi.io/golang:1
    container_name: orkestra-backend
    user: "1000:1000"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: staging
      PORT: 3000  # Internal port is always 3000, BACKEND_PORT is for host mapping only

      # Hot reload (AIR)
      AIR_BUILD_CMD: go build -o ./tmp/main ./cmd/server
      AIR_BIN: ./tmp/main

      # Go toolchain — write caches inside the bind mount so they survive rebuilds.
      # GOSUMDB=off because sum.golang.org isn't reliably reachable from the
      # corporate DNS upstream; module integrity still relies on go.sum.
      GOSUMDB: "off"
      GOMODCACHE: "/app/.go-mod-cache"
      GOCACHE: "/app/.go-build-cache"
      GOBIN: "/app/.go-bin"
      PATH: "/app/.go-bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

      # MongoDB (internal port is always 27017, MONGO_PORT is for host mapping only)
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongodb}:27017/${MONGO_DATABASE}?authSource=admin

      # Redis (internal port is always 6379, REDIS_PORT is for host mapping only)
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379/${REDIS_DB:-0}

      # JWT & Auth (RS256 asymmetric keys)
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      # OAuth Token Encryption — bootstraps ConfigService (every secret in
      # module_configs is AES-256-GCM encrypted with this key). Rotating it
      # invalidates every stored secret.
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}

      # Bootstrap OAuth seed values. config.go's production-like Validate()
      # still requires non-empty client id + secret (a stale check from
      # before ConfigService owned OAuth credentials — the live values are
      # now stored in module_configs and edited at /admin/modules). The
      # placeholders satisfy the boot-time gate without functional impact;
      # real values come from the admin UI.
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-placeholder.apps.googleusercontent.com}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-placeholder}

      # Compliance KMS master key (Phase 4.3) — 64 hex chars = 32 bytes.
      # Wraps per-tenant DEKs; losing this key invalidates every wrapped
      # DEK. Keep env-derived so operators can rotate without a rebuild.
      ORKESTRA_KMS_MASTER_KEY: ${ORKESTRA_KMS_MASTER_KEY}

      # Cookie Configuration (production-like)
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      # ADR-0003 PR-D D-9: per-audience refresh-cookie scopes. Set
      # OPERATOR_COOKIE_DOMAIN to console.<env>.orkestra.cc and
      # CLIENT_COOKIE_DOMAIN to api.<env>.orkestra.cc. Empty falls back
      # to COOKIE_DOMAIN (single-host transitional behaviour).
      OPERATOR_COOKIE_DOMAIN: ${OPERATOR_COOKIE_DOMAIN:-}
      CLIENT_COOKIE_DOMAIN: ${CLIENT_COOKIE_DOMAIN:-}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-strict}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}
      ALLOW_LOCALHOST_REDIRECTS: ${ALLOW_LOCALHOST_REDIRECTS:-false}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.orkestra.cc}
      BACKEND_URL: ${BACKEND_URL:-https://staging-api.orkestra.cc}
      # Per-tier frontend origins for verification + reset email links.
      # Empty falls back to FRONTEND_URL above. Set explicitly so a signup
      # on the client SPA gets a verify URL on the client host instead of
      # the operator console.
      OPERATOR_FRONTEND_URL: ${OPERATOR_FRONTEND_URL:-}
      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL:-}

      # CORS — legacy single-host fallback. Per-audience overrides
      # (OPERATOR_CORS_ORIGINS / CLIENT_CORS_ORIGINS) take precedence
      # when set.
      CORS_ORIGINS: ${CORS_ORIGINS:-https://staging.orkestra.cc}

      # ADR-0003 host split. CONSOLE_HOST serves the operator dashboard;
      # CLIENT_API_HOST serves Tier-2 client traffic (subscriptions,
      # payments, future AI runtime). Empty disables that audience's mux
      # — leave both unset only on hosts that should not serve any
      # public traffic.
      CONSOLE_HOST: ${CONSOLE_HOST:-staging-console.orkestra.cc}
      CLIENT_API_HOST: ${CLIENT_API_HOST:-staging-api.orkestra.cc}
      OPERATOR_CORS_ORIGINS: ${OPERATOR_CORS_ORIGINS:-}
      CLIENT_CORS_ORIGINS: ${CLIENT_CORS_ORIGINS:-}

      # Security (production-like)
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}
      OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE: ${OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      OPERATOR_RATE_LIMIT_BURST: ${OPERATOR_RATE_LIMIT_BURST:-0}
      CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE: ${CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      CLIENT_RATE_LIMIT_BURST: ${CLIENT_RATE_LIMIT_BURST:-0}

      # Staging specific
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRETTY_LOGS: "false"

      # Observability — forward every ADR-0005 toggle from .env so the
      # backend container actually sees them. Endpoint must include a
      # scheme (http://) or the OTLP SDK defaults to HTTPS and exports
      # silently fail against the plain-HTTP collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-orkestra-backend-staging}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
      OTEL_LOGS_ENABLED: ${OTEL_LOGS_ENABLED:-false}
      OTEL_METRICS_ENABLED: ${OTEL_METRICS_ENABLED:-false}

      # Sales Intelligence — runtime knobs read directly by the sales
      # module (cfg.Sales.*). Not yet migrated to ConfigService.
      SALES_MAX_CONCURRENCY: ${SALES_MAX_CONCURRENCY:-5}
      SALES_DEFAULT_LOCALE: ${SALES_DEFAULT_LOCALE:-it}
      SALES_SKILL_TIMEOUT: ${SALES_SKILL_TIMEOUT:-5m}
      SALES_QUICK_TIMEOUT: ${SALES_QUICK_TIMEOUT:-60s}
      SALES_FULL_TIMEOUT: ${SALES_FULL_TIMEOUT:-5m}
      SALES_SCRAPER_TIMEOUT: ${SALES_SCRAPER_TIMEOUT:-30s}
      SALES_SCRAPER_MAX_DEPTH: ${SALES_SCRAPER_MAX_DEPTH:-3}

      # RAG — chunking knobs read directly by the rag module (cfg.RAG.*).
      # Not yet migrated to ConfigService.
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      RAG_DEFAULT_TOP_K: ${RAG_DEFAULT_TOP_K:-10}

      # Module infrastructure containers (hindsight etc.). Disable when
      # running under Kubernetes or when infra is managed externally.
      CONTAINER_CONTROL_ENABLED: ${CONTAINER_CONTROL_ENABLED:-true}

      # Object storage (RustFS — S3-compatible). Backs avatar uploads.
      # Defaults below target the rustfs service in docker-compose.infra.yml.
      # Swap STORAGE_ENDPOINT to an AWS S3 (and set STORAGE_FORCE_PATH_STYLE=false)
      # for production-grade managed storage.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://orkestra-rustfs:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-orkestra-avatars}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-orkestra}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-changeme-rustfs}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      STORAGE_ENSURE_BUCKET: ${STORAGE_ENSURE_BUCKET:-true}

      # Marketing import spool — async-import payloads persist here between
      # Enqueue and worker pickup. The schema default
      # (/var/lib/orkestra/marketing/spool) is not writable by the
      # non-root container user; override to a path we own + back with a
      # named volume so spool survives restarts. First-boot seed only —
      # for an existing install change `importSpoolDir` at
      # /admin/modules/marketing instead (module_configs is authoritative
      # after the first boot).
      MARKETING_IMPORT_SPOOL_DIR: /app/marketing-spool

      # Module config (OAuth, OpenAPI billing/company tokens, Stripe keys,
      # SMTP, Hindsight URL, Memgraph URI, Gotenberg URL, AI provider keys,
      # per-module enable flags) is owned by ConfigService and edited at
      # /admin/modules. The module ConfigSchema EnvVar fields seed those
      # values from the host environment ONLY on first boot of a brand-new
      # install — after that the module_configs document is authoritative.
    volumes:
      - ../backend:/app
      - ./keys:/app/keys
      - orkestra-backend-logs-staging:/app/logs
      - orkestra-backend-uploads-staging:/app/uploads
      # Marketing import spool — bind mount instead of named volume so
      # the host dir's ownership (uid 1000) carries through. With
      # userns_mode: "host" the container's uid 1000 IS host uid 1000,
      # so the worker writes without a one-shot chown. Named volumes
      # get created with root ownership (uid 100000 under the daemon's
      # userns-remap) and would block the worker.
      - ./marketing-spool-staging:/app/marketing-spool
      # Enables the agents module to manage the orkestra-hindsight container
      # lifecycle. For stricter isolation in staging, front the socket with
      # tecnativa/docker-socket-proxy exposing only containers endpoints.
      - /var/run/docker.sock:/var/run/docker.sock
    # Join the host Docker group so the mounted socket is usable. Override
    # DOCKER_GID in the staging env file if the host uses a different gid.
    group_add:
      - "${DOCKER_GID:-1001}"
    # Required when the Docker daemon runs with userns-remap: without it,
    # group_add maps to a remapped GID that doesn't match the host docker
    # group, and the mounted socket stays unreadable.
    userns_mode: "host"
    networks:
      - orkestra-network
    # DNS inherits from the Docker daemon (`/etc/docker/daemon.json` →
    # `dns: ["192.168.88.4", ...]`). Don't override here unless this host's
    # firewall blocks the upstream — public resolvers (8.8.8.8, 1.1.1.1)
    # are not reachable on UDP/53 from this network.
    # AIR is pre-installed by the host into ./.go-bin/air via:
    #   cd backend && GOBIN=$PWD/.go-bin go install github.com/air-verse/air@latest
    command: ["sh", "-c", "exec /app/.go-bin/air"]
    # Note: mongodb and redis are in docker-compose.infra.yml
    # Ensure infra is running: docker compose -f docker-compose.infra.yml up -d
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/3000 && echo 'OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend-admin:
    image: dhi.io/node:24-dev
    container_name: orkestra-frontend-admin
    user: "1000:1000"
    userns_mode: "host"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    environment:
      NODE_ENV: development
      VITE_ENV: staging
      VITE_DEBUG: "false"
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-/}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
      VITE_HMR_HOST: staging.orkestra.cc
      # Host-computed app version surfaced in the SPA footer. orkestra.sh
      # exports this from `git describe`; the container has no git so
      # this passthrough is the only path. See docker-compose.dev.yml.
      ORKESTRA_VERSION: ${ORKESTRA_VERSION:-dev}
      NODE_OPTIONS: "--max-old-space-size=4096"
      npm_config_cache: /app/.npm-cache
    volumes:
      - ../frontend-admin:/app
      - ../frontend-admin/.vite-cache:/app/.vite
      - ../frontend-admin/.npm-cache:/app/.npm-cache
    networks:
      - orkestra-network
    depends_on:
      - backend
    # Regenerate public/config.js from the VITE_* env vars BEFORE `npm run
    # dev` starts. Vite serves files under public/ as-is, and the SPA reads
    # `window.__ORKESTRA_CONFIG__` from /config.js at boot — so without
    # this overwrite the staging container would serve whatever it found
    # bind-mounted from the host (or 404 on a clean checkout), and the
    # priority order in src/config/environment.ts puts runtime config
    # ahead of import.meta.env.VITE_API_URL.
    #
    # This is the dev-image equivalent of the production nginx entrypoint
    # at frontend-admin/Dockerfile:/docker-entrypoint.d/10-write-config.sh.
    # public/config.js is gitignored (see frontend-admin/.gitignore), so
    # the /app bind mount's leak back to the host no longer dirties
    # `git status`. The dev-default template at public/config.example.js
    # remains tracked as the fallback for hosts running `npm run dev`
    # outside Docker.
    command:
      - sh
      - -c
      - |
        cat > /app/public/config.js <<EOF
        // Generated at container start by docker-compose.staging.yml.
        // public/config.js is gitignored — see frontend-admin/CLAUDE.md.
        window.__ORKESTRA_CONFIG__ = {
          apiUrl: "$${VITE_API_URL}",
          wsUrl: "$${VITE_WS_URL}",
          env: "$${VITE_ENV}",
          debug: $${VITE_DEBUG}
        };
        EOF
        npm install && npm run dev -- --host 0.0.0.0

  # Tier-2 (external client) demo SPA — consumes the ADR-0003 client
  # API surface (staging-api.orkestra.cc, JWT aud=client). Sibling app
  # to the operator console; lives at frontend-client/. Bind-mounts the
  # source for hot reload; the browser hits the backend directly so
  # VITE_API_BASE must be reachable from the user's browser, not from
  # inside the container network.
  client-frontend:
    image: node:24-alpine
    container_name: orkestra-client-frontend
    user: "1000:1000"
    userns_mode: "host"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${CLIENT_FRONTEND_PORT:-8081}:5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE: ${VITE_CLIENT_API_BASE:-https://staging-api.orkestra.cc}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      # Hostnames the Vite dev server accepts (DNS-rebinding defence).
      # Localhost is always allowed; add the deployed hostnames here.
      VITE_ALLOWED_HOSTS: ${VITE_CLIENT_ALLOWED_HOSTS:-app.orkestra.cc}
      ORKESTRA_VERSION: ${ORKESTRA_VERSION:-dev}
      NODE_OPTIONS: "--max-old-space-size=4096"
      npm_config_cache: /app/.npm-cache
    volumes:
      - ../frontend-client:/app
      - ../frontend-client/.vite-cache:/app/.vite
      - ../frontend-client/.npm-cache:/app/.npm-cache
    networks:
      - orkestra-network
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    # Probes the in-process /health endpoint registered by the Vite
    # plugin in frontend-client/vite.config.ts. start_period covers a
    # cold-cache npm install (~20-30s on first boot, near-instant after).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  orkestra-backend-logs-staging:
    driver: local
  orkestra-backend-uploads-staging:
    driver: local

networks:
  orkestra-network:
    external: true
