# ORKESTRA Development Environment Docker Compose
# Local development with hot reload, relaxed security

name: orkestra-dev

services:
  orkestra-backend:
    image: dhi.io/golang:1
    container_name: orkestra-backend-dev
    user: "1000:1000"
    userns_mode: "host"
    # Join the host Docker group so the backend can read/write /var/run/docker.sock
    # for module container lifecycle. Override DOCKER_GID in .env if your host
    # uses a different gid (common values: 999 on Debian, 1001 on Ubuntu/WSL).
    group_add:
      - "${DOCKER_GID:-1001}"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: development
      PORT: 3000  # Internal port is always 3000, BACKEND_PORT is for host mapping only

      # MongoDB
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@${MONGO_HOST}:27017/${MONGO_DATABASE:-orkestra}?authSource=admin

      # Redis (internal port is always 6379, REDIS_PORT is for host mapping only)
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@${REDIS_HOST}:6379/${REDIS_DB:-0}

      # JWT & Auth (RS256 asymmetric keys)
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      # OAuth Token Encryption — bootstraps ConfigService (every secret in
      # module_configs is AES-256-GCM encrypted with this key). Rotating it
      # invalidates every stored secret.
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}

      # Compliance KMS master key (Phase 4.3) — 64 hex chars = 32 bytes.
      # Wraps per-tenant DEKs; losing this key invalidates every wrapped
      # DEK. Keep env-derived so operators can rotate without a rebuild.
      ORKESTRA_KMS_MASTER_KEY: ${ORKESTRA_KMS_MASTER_KEY}

      # Cookie Configuration
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      # ADR-0003 PR-D D-9: per-audience refresh-cookie domains. Dev
      # defaults align with the *.localhost host defaults below; leave
      # them empty (or unset OPERATOR_COOKIE_DOMAIN/CLIENT_COOKIE_DOMAIN)
      # to fall back to COOKIE_DOMAIN.
      OPERATOR_COOKIE_DOMAIN: ${OPERATOR_COOKIE_DOMAIN:-console.localhost}
      CLIENT_COOKIE_DOMAIN: ${CLIENT_COOKIE_DOMAIN:-api.localhost}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      # Per-tier frontend origins for verification + reset email links.
      # Empty falls back to FRONTEND_URL above.
      OPERATOR_FRONTEND_URL: ${OPERATOR_FRONTEND_URL:-}
      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL:-http://client.localhost:8081}

      # CORS (legacy single-host fallback)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://console.localhost:8080,http://api.localhost:8080}

      # ADR-0003 host split. Defaults use *.localhost so contributors
      # don't need /etc/hosts entries; the host mux also has a dev
      # fallthrough that routes unmatched hosts to the operator mux,
      # so curl http://localhost:3000 still works.
      CONSOLE_HOST: ${CONSOLE_HOST:-console.localhost:3000}
      CLIENT_API_HOST: ${CLIENT_API_HOST:-api.localhost:3000}
      OPERATOR_CORS_ORIGINS: ${OPERATOR_CORS_ORIGINS:-}
      # Default CLIENT_CORS_ORIGINS allows the new Tier-2 demo SPA at
      # http://client.localhost:8081 (served by orkestra-client-frontend).
      # Override in .env to add staging/prod origins.
      CLIENT_CORS_ORIGINS: ${CLIENT_CORS_ORIGINS:-http://client.localhost:8081,http://localhost:8081}

      # Security (relaxed for dev)
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-1000}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-100}
      OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE: ${OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      OPERATOR_RATE_LIMIT_BURST: ${OPERATOR_RATE_LIMIT_BURST:-0}
      CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE: ${CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      CLIENT_RATE_LIMIT_BURST: ${CLIENT_RATE_LIMIT_BURST:-0}

      # Development specific
      DEBUG: "true"
      LOG_LEVEL: debug
      PRETTY_LOGS: "true"

      # AI Service sidecar (empty = local modules, set = remote AI service)
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}

      # Module config (OAuth secrets, Stripe keys, OpenAPI tokens, SMTP,
      # Hindsight URL, Memgraph URI, Gotenberg URL, AI provider keys,
      # per-module enable flags) is owned by ConfigService and edited at
      # /admin/modules. The module ConfigSchema EnvVar fields seed those
      # values from the host environment ONLY on first boot of a brand-new
      # install — after that the module_configs document is authoritative.
      # If you need to bootstrap a fresh deployment from .env, export the
      # seed vars in the shell before running `docker compose up`.

      # Module infrastructure containers (e.g. hindsight).
      # Enables the backend to start/stop external containers when a module is toggled.
      # Set to "false" when running under Kubernetes or when you want to manage
      # infra containers externally.
      CONTAINER_CONTROL_ENABLED: ${CONTAINER_CONTROL_ENABLED:-true}

      # Hot reload
      AIR_BUILD_CMD: go build -o ./tmp/main ./cmd/server
      AIR_BIN: ./tmp/main

      # Go module settings
      GOSUMDB: "off"
      GOMODCACHE: "/app/.go-mod-cache"
      GOCACHE: "/app/.go-build-cache"
      GOBIN: "/app/.go-bin"
      PATH: "/app/.go-bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - ../backend:/app
      - ./keys:/app/keys
      # Bind-mount the host Docker socket so the backend can manage module
      # infrastructure containers (e.g. orkestra-hindsight for the agents
      # module). Hardening for staging/prod: front with tecnativa/docker-socket-proxy.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - orkestra-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: ["sh", "-c", "go mod download && go install github.com/air-verse/air@latest && air"]

  orkestra-frontend-admin:
    image: dhi.io/node:24-dev
    container_name: orkestra-frontend-admin-dev
    user: "1000:1000"
    userns_mode: "host"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    environment:
      NODE_ENV: development
      VITE_ENV: development
      VITE_DEBUG: "true"
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-/}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - ../frontend-admin:/app
      - ../frontend-admin/.vite-cache:/app/.vite
    networks:
      - orkestra-network
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]

  # Tier-2 (external client) demo SPA — consumes the ADR-0003 client API
  # surface (api.localhost:3000, JWT aud=client). Sibling app to the
  # operator console; lives at frontend-client/. Bind-mounts the source
  # for hot reload, hits the backend at api.localhost from the browser.
  #
  # Add to /etc/hosts for cookie-domain isolation to work end-to-end:
  #   127.0.0.1 console.localhost api.localhost client.localhost
  orkestra-client-frontend:
    image: node:24-alpine
    container_name: orkestra-client-frontend-dev
    user: "1000:1000"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${CLIENT_FRONTEND_PORT:-8081}:5173"
    environment:
      NODE_ENV: development
      # The browser hits the backend directly, so this URL must resolve
      # from the host (not from inside the container network).
      VITE_API_BASE: ${VITE_CLIENT_API_BASE:-http://api.localhost:3000}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      # Hostnames the Vite dev server accepts (DNS-rebinding defence).
      # Localhost is always allowed; add deployed hostnames here.
      VITE_ALLOWED_HOSTS: ${VITE_CLIENT_ALLOWED_HOSTS:-client.localhost}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - ../frontend-client:/app
      - ../frontend-client/.vite-cache:/app/.vite
    networks:
      - orkestra-network
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    # Probes the in-process /health endpoint registered by the Vite
    # plugin in frontend-client/vite.config.ts.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  orkestra-network:
    external: true