# Orkestra — SaaS SKU (published image)
#
# Pulls the saas profile image from GHCR (subscriptions + payments +
# compliance + identity addons) and runs it against the shared mongodb/redis
# services from docker-compose.infra.yml. The payments addon expects Stripe
# credentials configured at /admin/modules.
#
# Usage:
#   cd docker
#   docker network create orkestra-network                        # once
#   docker compose -f docker-compose.infra.yml up -d              # mongodb + redis
#   docker compose -f docker-compose.saas.yml --env-file .env up -d
#
# Health check: backend `/health` returns 200 once mongo/redis come up.

name: orkestra-saas

services:
  backend:
    image: ${BACKEND_IMAGE_REPO:-ghcr.io/orkestra-cc/orkestra}/backend:${BACKEND_IMAGE_TAG:-saas}
    container_name: orkestra-backend-saas
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: ${ENV:-production}
      PORT: 3000
      ORKESTRA_PROFILE: saas

      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongodb}:27017/${MONGO_DATABASE}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379/${REDIS_DB:-0}

      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}
      ORKESTRA_KMS_MASTER_KEY: ${ORKESTRA_KMS_MASTER_KEY:-}

      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      OPERATOR_COOKIE_DOMAIN: ${OPERATOR_COOKIE_DOMAIN:-}
      CLIENT_COOKIE_DOMAIN: ${CLIENT_COOKIE_DOMAIN:-}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}

      # Staging/production validators (see backend/internal/shared/config/config.go::Validate).
      # OAuth Google creds are ConfigService-managed at runtime; the env-var validator is
      # stale (see MEMORY: "Staging gotcha (post-PR-C)"). Placeholder fallbacks unblock boot.
      ALLOW_LOCALHOST_REDIRECTS: ${ALLOW_LOCALHOST_REDIRECTS:-false}
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-placeholder.apps.googleusercontent.com}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-placeholder}

      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      OPERATOR_FRONTEND_URL: ${OPERATOR_FRONTEND_URL:-}
      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL:-}

      CONSOLE_HOST: ${CONSOLE_HOST:-console.localhost:3000}
      CLIENT_API_HOST: ${CLIENT_API_HOST:-api.localhost:3000}
      OPERATOR_CORS_ORIGINS: ${OPERATOR_CORS_ORIGINS:-}
      CLIENT_CORS_ORIGINS: ${CLIENT_CORS_ORIGINS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}

      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-60}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-10}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      PRETTY_LOGS: ${PRETTY_LOGS:-false}

      # No infra-owning addon in this profile — container control off.
      CONTAINER_CONTROL_ENABLED: ${CONTAINER_CONTROL_ENABLED:-false}
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - orkestra-network

  # Operator console SPA — pulls the GHCR image and configures it at
  # container start via window.__ORKESTRA_CONFIG__ (see frontend-admin's
  # docker-entrypoint.d/10-write-config.sh). One image works in dev /
  # staging / prod — set ORKESTRA_API_URL / ORKESTRA_WS_URL / ORKESTRA_ENV
  # to whatever the browser needs to reach the backend.
  frontend-admin:
    image: ${FRONTEND_IMAGE_REPO:-ghcr.io/orkestra-cc/orkestra}/frontend:${FRONTEND_IMAGE_TAG:-latest}
    container_name: orkestra-frontend-admin-saas
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    environment:
      # Chain: explicit override → VITE_* values the staging stack already
      # uses → BACKEND_URL → localhost. Keeps the single-.env model: the
      # same env vars that drive the full staging stack drive the SKU
      # frontend without duplication.
      ORKESTRA_API_URL: ${ORKESTRA_API_URL:-${VITE_API_URL:-${BACKEND_URL:-http://localhost:3000}}}
      ORKESTRA_WS_URL: ${ORKESTRA_WS_URL:-${VITE_WS_URL:-ws://localhost:3000/ws}}
      ORKESTRA_ENV: ${ORKESTRA_ENV:-${VITE_ENV:-${ENV:-production}}}
      ORKESTRA_DEBUG: ${ORKESTRA_DEBUG:-${VITE_DEBUG:-false}}
    networks:
      - orkestra-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  orkestra-network:
    external: true
