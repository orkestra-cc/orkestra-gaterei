# Tempo config for the Orkestra observability stack.
#
# Single-binary Tempo listening for OTLP on 4317 (gRPC), storing traces
# on a local volume. Good enough for dev / single-host staging; for
# production with meaningful retention, swap the local backend for S3.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  max_block_duration: 5m
  trace_idle_period: 10s

compactor:
  compaction:
    block_retention: 72h  # keep traces for 3 days locally

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

usage_report:
  reporting_enabled: false
