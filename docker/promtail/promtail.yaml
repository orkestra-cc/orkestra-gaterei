# Promtail configuration — Phase D of ADR-0005.
#
# Tails Docker container stdout for every running container, filters
# to Orkestra services, parses the JSON line that the backend's slog
# JSONHandler emits (ENV=production|staging), and ships to Loki.
#
# Why Promtail and not the Loki Docker logging driver?
#   * The driver requires a host-level plugin install (`docker plugin
#     install grafana/loki-docker-driver`). That's an extra step
#     operators have to remember and a foot-gun if it fails — log
#     volume disappears with no fallback.
#   * Promtail is a container we manage in the same compose file. No
#     host changes. When it dies, stdout is still captured by the
#     Docker logger and a restart re-tails from where it stopped.
#
# Why Promtail and not Grafana Alloy?
#   * Alloy is the strategic successor but as of 2026 the migration
#     story is still in motion. Promtail is in maintenance mode but
#     still receives security patches. Swap-in target for a future
#     phase once Alloy stabilizes.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://orkestra-loki:3100/loki/api/v1/push
    # batch_wait controls latency from log emit → Loki query
    # visibility. 1s is the Promtail default; lowering it makes tail
    # interactive at the cost of more HTTP traffic.
    batchwait: 1s
    batchsize: 1048576

scrape_configs:
  # Discover containers via the Docker daemon and tail each one's
  # JSON-file log driver output. The driver writes one JSON record
  # per line at /var/lib/docker/containers/<id>/<id>-json.log — we
  # mount that path read-only.
  - job_name: orkestra
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        # Only attach to containers explicitly labelled as part of
        # this network. The Orkestra compose files all use the
        # external `orkestra-network` so this filter is reliable.
        filters:
          - name: network
            values: ["orkestra-network"]

    relabel_configs:
      # Map Docker container metadata to Loki labels. Keep cardinality
      # low — names like "orkestra-backend-dev" are bounded by how
      # many services live in the compose project.
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "compose_service"
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "compose_project"
      # `service` is the load-bearing label backend code stamps on
      # every JSON line via SetupLogger(.With("service", "orkestra-backend")).
      # We seed it here from the compose service name as a fallback for
      # containers whose log format isn't JSON (Mongo, Redis, Loki
      # itself); the pipeline_stages below will overwrite with the
      # in-payload value when present.
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"

    pipeline_stages:
      # Try to parse the line as JSON. If it parses, lift selected
      # fields up to extracted-data for downstream label assignment.
      # If it doesn't (Mongo's text logs, Redis's plain output, the
      # Loki container itself), the stage is a silent no-op and the
      # line ships through as-is — operators can still query by
      # container name.
      - json:
          expressions:
            level: level
            module: module
            service: service
            trace_id: trace_id
            tenant_id: tenant_id
            audience: audience

      # Promote low-cardinality fields to labels. The forbidden set
      # (ADR-0005 §1.2) — Authorization, Cookie, request bodies — was
      # never logged in the first place, so there's nothing to scrub
      # here. tenant_id and user_id are intentionally NOT labelled:
      # they belong in the structured payload (`| json | tenant_id="..."`)
      # so we don't blow out Loki cardinality the same way ADR-0002
      # bans them as Prometheus labels.
      - labels:
          level:
          module:
          service:
          audience:

      # Carry trace_id and tenant_id as Loki "structured metadata"
      # (Loki 3.0+). Structured metadata is indexed but doesn't inflate
      # active stream count — the right home for high-cardinality
      # identifiers that need to be queryable but shouldn't shard the
      # stream space.
      - structured_metadata:
          trace_id:
          tenant_id:
