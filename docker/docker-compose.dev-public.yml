# ORKESTRA Development Environment — public images variant
#
# This is the DEFAULT dev stack (fork-friendly, no registry auth). It is now a
# thin OVERLAY of docker-compose.dev.yml: it pulls in every service, env-var,
# port, volume, command, dns and healthcheck from that file via `include`, then
# patches only the handful of keys that differ between the public (Alpine) and
# Chainguard variants. The two files used to be maintained as full copies in
# lockstep; this overlay removes that duplication — edit shared config in
# docker-compose.dev.yml and it flows here automatically.
#
# Use this when:
#   - You're forking Orkestra and don't have a dhi.io enterprise subscription
#   - You want a quick offline-friendly local stack without registry auth
#   - You're running on a host/network where dhi.io is blocked
#
# What this overlay changes vs the docker-compose.dev.yml base (Chainguard):
#   orkestra-backend:
#     - build from Dockerfile.dev-public-backend (Alpine bakes in git/build-base/AIR)
#       instead of running the stock dhi.io/golang:1 image
#     - command runs AIR directly (it is pre-baked into the image, no runtime
#       `go install`)
#   orkestra-frontend-admin: node:24-alpine instead of dhi.io/node:24-dev
#   orkestra-client-frontend: unchanged (already node:24-alpine in the base)
#   dns: neither variant sets it — both inherit the docker daemon's resolvers.
#
# Behavior parity verified by `docker compose ... config` diff against the
# previous standalone file — identical output (bar a cosmetic comment string).
#
# Requires Docker Compose v2.20+ for the top-level `include:` directive
# (ships with current Docker). No custom merge tags are used.
#
# Opt into the Chainguard variant (needs dhi.io access) by setting
# DEV_COMPOSE_VARIANT=chainguard in docker/.env — orkestra.sh then uses
# docker-compose.dev.yml directly. See README.md "Full development stack".

include:
  - docker-compose.dev.yml

name: orkestra-dev

services:
  orkestra-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev-public-backend
    image: orkestra/dev-public-backend:latest
    # git, build-base and AIR are pre-baked into the dev-public-backend image,
    # so no runtime `go install github.com/air-verse/air` is needed. Compose
    # replaces `command` on merge (it is not an appended list), so this wins.
    command: ["sh", "-c", "go mod download && air"]

  orkestra-frontend-admin:
    image: node:24-alpine
