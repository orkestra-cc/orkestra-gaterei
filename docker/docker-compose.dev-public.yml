# ORKESTRA Development Environment — public images variant
#
# Same hot-reload dev stack as docker-compose.dev.yml, but uses public
# Alpine images instead of the Chainguard (`dhi.io/*`) hardened images.
# Use this when:
#   - You're forking Orkestra and don't have a dhi.io enterprise subscription
#   - You want a quick offline-friendly local stack without registry auth
#   - You're running on a hardware/network where dhi.io is blocked
#
# Differences vs docker-compose.dev.yml (the Chainguard variant):
#   - orkestra-backend:        dhi.io/golang:1     → golang:1.25.10-alpine
#   - orkestra-frontend-admin: dhi.io/node:24-dev  → node:24-alpine
#   - orkestra-client-frontend: unchanged (already node:24-alpine)
#
# Every env-var, port mapping, volume, command, dns, and healthcheck is
# identical. Behavior parity verified by side-by-side compose-config diff.
#
# Use docker-compose.dev.yml if your operator has a Chainguard subscription
# (smaller attack surface, faster security patches). This file is the
# default the README points at — see README.md "Full development stack".

name: orkestra-dev

services:
  orkestra-backend:
    image: golang:1.25.10-alpine
    container_name: orkestra-backend-dev
    user: "1000:1000"
    userns_mode: "host"
    # Join the host Docker group so the backend can read/write /var/run/docker.sock
    # for module container lifecycle. Override DOCKER_GID in .env if your host
    # uses a different gid (common values: 999 on Debian, 1001 on Ubuntu/WSL).
    group_add:
      - "${DOCKER_GID:-1001}"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: development
      PORT: 3000  # Internal port is always 3000, BACKEND_PORT is for host mapping only

      # MongoDB
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@${MONGO_HOST}:27017/${MONGO_DATABASE:-orkestra}?authSource=admin

      # Redis (internal port is always 6379, REDIS_PORT is for host mapping only)
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@${REDIS_HOST}:6379/${REDIS_DB:-0}

      # JWT & Auth (RS256 asymmetric keys)
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      # OAuth Token Encryption — bootstraps ConfigService (every secret in
      # module_configs is AES-256-GCM encrypted with this key). Rotating it
      # invalidates every stored secret.
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}

      # Compliance KMS master key — 64 hex chars = 32 bytes. Wraps per-tenant
      # DEKs; losing this key invalidates every wrapped DEK. Keep env-derived
      # so operators can rotate without a rebuild.
      ORKESTRA_KMS_MASTER_KEY: ${ORKESTRA_KMS_MASTER_KEY}

      # Cookie Configuration
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      OPERATOR_COOKIE_DOMAIN: ${OPERATOR_COOKIE_DOMAIN:-console.localhost}
      CLIENT_COOKIE_DOMAIN: ${CLIENT_COOKIE_DOMAIN:-api.localhost}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      OPERATOR_FRONTEND_URL: ${OPERATOR_FRONTEND_URL:-}
      CLIENT_FRONTEND_URL: ${CLIENT_FRONTEND_URL:-http://client.localhost:8081}

      # CORS (legacy single-host fallback)
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173,http://console.localhost:8080,http://api.localhost:8080}

      # ADR-0003 host split
      CONSOLE_HOST: ${CONSOLE_HOST:-console.localhost:3000}
      CLIENT_API_HOST: ${CLIENT_API_HOST:-api.localhost:3000}
      OPERATOR_CORS_ORIGINS: ${OPERATOR_CORS_ORIGINS:-}
      CLIENT_CORS_ORIGINS: ${CLIENT_CORS_ORIGINS:-http://client.localhost:8081,http://localhost:8081}

      # Security (relaxed for dev)
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-1000}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-100}
      OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE: ${OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      OPERATOR_RATE_LIMIT_BURST: ${OPERATOR_RATE_LIMIT_BURST:-0}
      CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE: ${CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      CLIENT_RATE_LIMIT_BURST: ${CLIENT_RATE_LIMIT_BURST:-0}

      # Development specific
      DEBUG: "true"
      LOG_LEVEL: debug
      PRETTY_LOGS: "true"

      # AI Service sidecar (empty = local modules, set = remote AI service)
      AI_SERVICE_URL: ${AI_SERVICE_URL:-}

      # Module infrastructure containers (e.g. hindsight).
      CONTAINER_CONTROL_ENABLED: ${CONTAINER_CONTROL_ENABLED:-true}

      # Marketing import spool — async-import payloads persisted here
      # between Enqueue and worker pickup.
      MARKETING_IMPORT_SPOOL_DIR: /app/marketing-spool

      # Object storage (RustFS — S3-compatible). Backs avatar uploads.
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-http://orkestra-rustfs:9000}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-orkestra-avatars}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-orkestra}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-changeme-rustfs}
      STORAGE_FORCE_PATH_STYLE: ${STORAGE_FORCE_PATH_STYLE:-true}
      STORAGE_ENSURE_BUCKET: ${STORAGE_ENSURE_BUCKET:-true}

      # Hot reload
      AIR_BUILD_CMD: go build -o ./tmp/main ./cmd/server
      AIR_BIN: ./tmp/main

      # Go module settings
      GOSUMDB: "off"
      GOMODCACHE: "/app/.go-mod-cache"
      GOCACHE: "/app/.go-build-cache"
      GOBIN: "/app/.go-bin"
      PATH: "/app/.go-bin:/go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
    volumes:
      - ../backend:/app
      - ./keys:/app/keys
      # Marketing import spool — bind mount (not named volume) so host
      # ownership (uid 1000) carries through under userns_mode: "host".
      - ./marketing-spool-dev:/app/marketing-spool
      # Bind-mount host Docker socket so the backend can manage module
      # infrastructure containers (e.g. orkestra-hindsight for agents).
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - orkestra-network
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Public golang:alpine doesn't ship git/build-base; apk-install them
    # before `go mod download` reaches a private module or before AIR's
    # incremental rebuild needs cgo. The dhi.io variant has these baked in.
    command: ["sh", "-c", "apk add --no-cache git build-base && go mod download && go install github.com/air-verse/air@latest && air"]

  orkestra-frontend-admin:
    image: node:24-alpine
    container_name: orkestra-frontend-admin-dev
    user: "1000:1000"
    userns_mode: "host"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:5173"
    environment:
      NODE_ENV: development
      VITE_ENV: development
      VITE_DEBUG: "true"
      VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-/}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - ../frontend-admin:/app
      - ../frontend-admin/.vite-cache:/app/.vite
    networks:
      - orkestra-network
    # Regenerate public/config.js from VITE_* env vars BEFORE `npm run dev`
    # starts. public/config.js is gitignored — each environment writes its
    # own. The dev-default template at public/config.example.js is the
    # fallback when this script can't run.
    command:
      - sh
      - -c
      - |
        cat > /app/public/config.js <<EOF
        // Generated at container start by docker-compose.dev-public.yml.
        // Gitignored — do not commit. See frontend-admin/CLAUDE.md.
        window.__ORKESTRA_CONFIG__ = {
          apiUrl: "$${VITE_API_URL}",
          wsUrl: "$${VITE_WS_URL}",
          env: "$${VITE_ENV}",
          debug: $${VITE_DEBUG}
        };
        EOF
        npm install && npm run dev -- --host 0.0.0.0

  # Tier-2 (external client) demo SPA — already on a public image; no swap
  # vs docker-compose.dev.yml.
  orkestra-client-frontend:
    image: node:24-alpine
    container_name: orkestra-client-frontend-dev
    user: "1000:1000"
    working_dir: /app
    restart: unless-stopped
    ports:
      - "${CLIENT_FRONTEND_PORT:-8081}:5173"
    environment:
      NODE_ENV: development
      VITE_API_BASE: ${VITE_CLIENT_API_BASE:-http://api.localhost:3000}
      VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
      VITE_ALLOWED_HOSTS: ${VITE_CLIENT_ALLOWED_HOSTS:-client.localhost}
      NODE_OPTIONS: "--max-old-space-size=4096"
    volumes:
      - ../frontend-client:/app
      - ../frontend-client/.vite-cache:/app/.vite
    networks:
      - orkestra-network
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  orkestra-network:
    external: true
