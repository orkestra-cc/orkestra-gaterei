# Prometheus config for the Orkestra observability stack.
#
# Two scrape targets today: the OTEL collector's Prometheus-format
# exporter, and (from Phase 5.3) the backend's own /metrics endpoint.
# The backend target is pre-wired but will yield "scrape failed" until
# Phase 5.3 registers a promhttp handler — that is intentional so this
# config does not need to change twice.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # OTel collector has two metric surfaces and we scrape both:
  #   :8889 — the Prometheus exporter for OTLP-received customer metrics
  #           (populated only when a sender sets OTEL_METRICS_ENABLED=true).
  #   :8888 — the collector's own internal telemetry (`otelcol_receiver_*`,
  #           `otelcol_exporter_*`, `otelcol_processor_dropped_*` etc.) used
  #           by the Pipeline Health dashboard to detect drops/failures.
  # Separate jobs so :8889 going empty doesn't pollute the self-telemetry
  # series.
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["orkestra-otel:8889"]
        labels:
          service: otel-collector

  - job_name: otel-collector-self
    metrics_path: /metrics
    static_configs:
      - targets: ["orkestra-otel:8888"]
        labels:
          service: otel-collector-self

  - job_name: orkestra-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["orkestra-backend-dev:3000", "orkestra-backend:3000"]
        labels:
          service: orkestra-backend
    # Both dev and prod container names are listed so the same config
    # file works across profiles; whichever container isn't running just
    # shows up as "down" in the targets list.

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
