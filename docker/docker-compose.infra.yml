name: orkestra-infra

services:
  mongodb:
    image: mongo:8.0
    container_name: orkestra-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-orkestra}
    volumes:
      - orkestra-mongodb-data:/data/db
      - orkestra-mongodb-config:/data/configdb
    networks:
      - orkestra-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: orkestra-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - orkestra-redis-data:/data
    networks:
      - orkestra-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RustFS — S3-compatible object storage (Apache-2.0, written in Rust).
  # Default backend for user-uploaded blobs (avatars today, future
  # attachments). Speaks the AWS S3 API so the same `internal/shared/blob`
  # store works against RustFS, AWS S3, MinIO, Backblaze B2, etc.
  #
  # Status note: RustFS 1.x is in beta — production-grade single-node
  # mode is fine for avatars (small, regenerable from OAuth fallback);
  # distributed mode is still under testing. Operators running at scale
  # should swap STORAGE_ENDPOINT to a managed S3 in production.
  #
  # Ports: 9100 (S3 API — bumped off the MinIO/Redis-Insight default
  # 9000 to avoid host-port collisions), 9101 (admin console).
  rustfs:
    image: rustfs/rustfs:latest
    container_name: orkestra-rustfs
    restart: unless-stopped
    ports:
      - "${RUSTFS_API_PORT:-9100}:9000"
      - "${RUSTFS_CONSOLE_PORT:-9101}:9001"
    environment:
      RUSTFS_ROOT_USER: ${RUSTFS_ROOT_USER:-orkestra}
      RUSTFS_ROOT_PASSWORD: ${RUSTFS_ROOT_PASSWORD:-changeme-rustfs}
    volumes:
      - orkestra-rustfs-data:/data
    networks:
      - orkestra-network
    healthcheck:
      # /minio/health/live is the canonical S3-compat liveness path RustFS
      # serves verbatim. A 200 means the API surface is up; bucket access
      # is checked by the backend's blob.NewS3(EnsureBucket=true) on boot.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: orkestra-gotenberg
    restart: unless-stopped
    ports:
      - "${GOTENBERG_PORT:-3030}:3000"
    command:
      - "gotenberg"
      - "--api-timeout=120s"
      - "--chromium-max-queue-size=20"
    networks:
      - orkestra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Memgraph is lifecycle-managed by the backend: the graph module boots
  # this container via the shared/container package when it is enabled in
  # the admin UI and stops it again when disabled. It lives behind the
  # "manual-only" profile so `docker compose up -d` does not bring it up
  # automatically. To run memgraph manually (e.g. to inspect or debug):
  #   docker compose -f docker-compose.infra.yml --profile manual-only up -d memgraph
  memgraph:
    profiles: ["manual-only"]
    image: memgraph/memgraph-mage:latest
    container_name: orkestra-memgraph
    restart: unless-stopped
    ports:
      - "${MEMGRAPH_BOLT_PORT:-7687}:7687"
      - "${MEMGRAPH_MONITORING_PORT:-7444}:7444"
    volumes:
      - orkestra-memgraph-data:/var/lib/memgraph
    networks:
      - orkestra-network
    # No healthcheck: Memgraph speaks Bolt (not HTTP) and the stock image
    # has no TCP-probe binary. The backend's container.Manager does its
    # own TCP dial on 7687 before marking the module healthy, which is
    # the authoritative signal anyway.

  # Hindsight is lifecycle-managed by the backend: the agents module boots
  # this container via the shared/container package when it is enabled in
  # the admin UI and stops it again when disabled. It lives behind the
  # "manual-only" profile so `docker compose up -d` no longer brings it up
  # automatically. To run hindsight manually (e.g. to inspect or debug):
  #   docker compose -f docker-compose.infra.yml --profile manual-only up -d hindsight
  hindsight:
    profiles: ["manual-only"]
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: orkestra-hindsight
    restart: unless-stopped
    ports:
      - "${HINDSIGHT_PORT:-8888}:8888"
    environment:
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_LLM_API_KEY:-}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_LLM_MODEL:-gpt-4o-mini}
      HINDSIGHT_API_LLM_BASE_URL: ${HINDSIGHT_LLM_BASE_URL:-}
    volumes:
      - orkestra-hindsight-data:/home/hindsight/.pg0
    networks:
      - orkestra-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  # All volumes pin their literal Docker name (no project prefix) so the
  # data survives across compose project namespaces — e.g. running
  # `docker compose -f docker-compose.infra.yml ...` vs
  # `docker compose -f docker-compose.infra.yml -f docker-compose.starter.yml ...`
  # (the second file's `name:` would otherwise replace the prefix and
  # produce a separate, empty volume). Without explicit name pinning,
  # MongoDB data is silently lost every time you change which SKU compose
  # is layered on top.
  orkestra-mongodb-data:
    driver: local
    name: orkestra-mongodb-data
  orkestra-mongodb-config:
    driver: local
    name: orkestra-mongodb-config
  orkestra-redis-data:
    driver: local
    name: orkestra-redis-data
  orkestra-rustfs-data:
    driver: local
    # Pinned name — same reasoning as the mongodb/redis volumes above:
    # different compose layerings (infra alone vs infra + a SKU profile)
    # must address the same underlying volume so uploaded blobs survive
    # stack reshuffles.
    name: orkestra-rustfs-data
  orkestra-hindsight-data:
    driver: local
    # Pinned name so the backend's container.Manager and the manual-only
    # compose profile address the same Docker volume. Without this,
    # compose would prefix the project name (orkestra-infra_...), while
    # the backend references the literal name — producing two different
    # volumes with divergent data.
    name: orkestra-hindsight-data
  orkestra-memgraph-data:
    driver: local
    # Pinned name — same reasoning as orkestra-hindsight-data above. The
    # graph module creates this volume directly via the Docker API at
    # container-create time, so the compose-declared name must match.
    name: orkestra-memgraph-data

networks:
  orkestra-network:
    external: true
