name: orkestra-infra

services:
  mongodb:
    image: mongo:8.0
    container_name: orkestra-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-orkestra}
    volumes:
      - orkestra-mongodb-data:/data/db
      - orkestra-mongodb-config:/data/configdb
    networks:
      - orkestra-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: orkestra-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - orkestra-redis-data:/data
    networks:
      - orkestra-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  orkestra-mongodb-data:
    driver: local
  orkestra-mongodb-config:
    driver: local
  orkestra-redis-data:
    driver: local

networks:
  orkestra-network:
    external: true