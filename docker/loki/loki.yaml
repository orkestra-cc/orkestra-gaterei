# Loki configuration — Phase D of ADR-0005.
#
# Single-binary mode (all components in one process, filesystem
# storage). Sized for a single operator deployment. Production at scale
# would split into ingester / querier / compactor pods backed by S3 or
# GCS; that's an explicit operator choice when the fleet grows past
# what one VM can swallow.
#
# Multi-tenancy: disabled here. Loki's "tenant" concept is unrelated to
# Orkestra's two-tier model — Loki tenants are storage partitions and
# our Promtail ships everything as "fake" (the default). Per-Orkestra-
# tenant filtering happens at query time via LogQL `| json | tenant_id="..."`
# (ADR-0005 §1.1).

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  # Logs from Loki itself are info-level; debug would drown out backend
  # logs in the same Loki instance.
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention. ADR-0005 §3 calls for 14d on info, 30d on warn+. Loki
# implements per-stream retention by matching LogQL selectors against
# the compactor's retention rules. Anything that doesn't match a
# specific rule falls back to retention_period (14d).
#
# The warn+ rule keys on the `level` label that Promtail extracts from
# the JSON log line. If the level label is somehow missing (a
# malformed line, or a log emitted by a non-orkestra container) the
# default 14d applies — safe failure mode.
limits_config:
  retention_period: 336h  # 14 days for the info+ default stream
  # Per-stream retention overrides. Loki's compactor walks these in
  # priority order; the first match wins. warn-level and error-level
  # streams (identified by the `level` label Promtail extracts from
  # the JSON log line) are kept twice as long as info.
  retention_stream:
    - selector: '{level=~"warn|error"}'
      priority: 1
      period: 720h  # 30 days for warn+
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_length: 720h
  max_query_parallelism: 32
  # Allow structured metadata so trace_id / span_id can ride along
  # without inflating label cardinality.
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# Per-stream retention overrides. Loki evaluates these in order during
# compaction; the first matching selector wins. Streams matched by
# {level="warn"} or {level="error"} get 30 days; everything else falls
# back to limits_config.retention_period (14d).
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Disable anonymous usage reporting — Loki phones home by default.
analytics:
  reporting_enabled: false
