# ORKESTRA Production Environment Docker Compose
# Full security, production credentials

name: orkestra-prod

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    container_name: orkestra-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      ENV: production
      PORT: 3000  # Internal port is always 3000, BACKEND_PORT is for host mapping only

      # MongoDB (internal port is always 27017, MONGO_PORT is for host mapping only)
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@${MONGO_HOST:-mongodb}:27017/${MONGO_DATABASE}?authSource=admin

      # Redis (internal port is always 6379, REDIS_PORT is for host mapping only)
      REDIS_URL: redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379/${REDIS_DB:-0}

      # JWT & Auth (RS256 asymmetric keys)
      JWT_PRIVATE_KEY_PATH: ${JWT_PRIVATE_KEY_PATH:-/app/keys/jwt-private.pem}
      JWT_PUBLIC_KEY_PATH: ${JWT_PUBLIC_KEY_PATH:-/app/keys/jwt-public.pem}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}

      # OAuth Token Encryption — bootstraps ConfigService (every secret in
      # module_configs is AES-256-GCM encrypted with this key). Rotating it
      # invalidates every stored secret.
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY}

      # Compliance KMS master key (Phase 4.3) — 64 hex chars = 32 bytes.
      # Wraps per-tenant DEKs; losing this key invalidates every wrapped DEK.
      ORKESTRA_KMS_MASTER_KEY: ${ORKESTRA_KMS_MASTER_KEY}

      # Cookie Configuration (maximum security)
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_NAME: ${COOKIE_NAME:-orkestra_cookie}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      COOKIE_HTTP_ONLY: ${COOKIE_HTTP_ONLY:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-strict}
      COOKIE_MAX_AGE: ${COOKIE_MAX_AGE:-86400000}

      # URLs
      FRONTEND_URL: ${FRONTEND_URL:-https://orkestra.cc}
      BACKEND_URL: ${BACKEND_URL:-https://api.orkestra.cc}

      # ADR-0003 host split. Production has no dev fallthrough — an
      # unmatched Host header returns 421 Misdirected Request, so both
      # CONSOLE_HOST and CLIENT_API_HOST must point at the actual public
      # hostnames behind the ingress.
      CONSOLE_HOST: ${CONSOLE_HOST:-console.orkestra.com}
      CLIENT_API_HOST: ${CLIENT_API_HOST:-api.orkestra.com}
      OPERATOR_CORS_ORIGINS: ${OPERATOR_CORS_ORIGINS:-}
      CLIENT_CORS_ORIGINS: ${CLIENT_CORS_ORIGINS:-}

      # Security (strict)
      RATE_LIMIT_REQUESTS_PER_MINUTE: ${RATE_LIMIT_REQUESTS_PER_MINUTE:-30}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-5}
      OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE: ${OPERATOR_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      OPERATOR_RATE_LIMIT_BURST: ${OPERATOR_RATE_LIMIT_BURST:-0}
      CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE: ${CLIENT_RATE_LIMIT_REQUESTS_PER_MINUTE:-0}
      CLIENT_RATE_LIMIT_BURST: ${CLIENT_RATE_LIMIT_BURST:-0}

      # Production specific
      DEBUG: "false"
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      PRETTY_LOGS: "false"

      # Observability
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-orkestra-backend}

      # Module infrastructure containers (hindsight etc.). Set to "false" on
      # Kubernetes deployments where the orchestrator owns container lifecycle.
      CONTAINER_CONTROL_ENABLED: ${CONTAINER_CONTROL_ENABLED:-true}

      # Module config (OAuth, OpenAPI billing/company tokens, Stripe keys,
      # SMTP, Hindsight URL, Memgraph URI, Gotenberg URL, AI provider keys,
      # per-module enable flags) is owned by ConfigService and edited at
      # /admin/modules. The module ConfigSchema EnvVar fields seed those
      # values from the host environment ONLY on first boot of a brand-new
      # install — after that the module_configs document is authoritative.
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./keys:/app/keys:ro
      # Docker socket mount enables runtime container control. In production
      # Docker Swarm, strongly consider fronting this with
      # tecnativa/docker-socket-proxy and restricting to container endpoints.
      - /var/run/docker.sock:/var/run/docker.sock
    # Join the host Docker group so the mounted socket is usable. Override
    # DOCKER_GID in the production env file if the host uses a different gid.
    group_add:
      - "${DOCKER_GID:-1001}"
    networks:
      - orkestra-network
    # Note: mongodb and redis are in docker-compose.infra.yml
    # Ensure infra is running: docker compose -f docker-compose.infra.yml up -d
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/3000 && echo 'OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.orkestra.cc}
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://api.orkestra.cc}
        VITE_WS_URL: ${VITE_WS_URL:-wss://api.orkestra.cc/ws}
        VITE_PUBLIC_URL: ${VITE_PUBLIC_URL:-/}
        VITE_ENV: production
        VITE_DEBUG: "false"
        VITE_SENTRY_DSN: ${SENTRY_DSN_FRONTEND}
    container_name: orkestra-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - orkestra-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  orkestra-network:
    external: true